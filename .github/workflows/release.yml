name: Release

# Build and publish binaries for Windows, macOS and Linux whenever a version
# tag (e.g. v0.1.0) is pushed. Assets are embedded into the executable via
# `include_bytes!`, so each archive is a single self-contained binary.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout (with LFS assets)
        uses: actions/checkout@v4
        with:
          # The embedded textures/structures are stored in Git LFS; without
          # them `include_bytes!` would compile LFS pointer files instead of
          # the real assets.
          lfs: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libx11-dev libxcursor-dev libxi-dev libxrandr-dev

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive="survival-cubed-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          tar -czf "$archive" -C "target/${{ matrix.target }}/release" survival-cubed
          echo "ASSET=$archive" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "survival-cubed-$env:GITHUB_REF_NAME-${{ matrix.target }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/survival-cubed.exe" -DestinationPath $archive
          echo "ASSET=$archive" >> $env:GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
